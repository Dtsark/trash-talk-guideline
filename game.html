<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trash Talk - Learning Game</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --accent: #ff3333;
            --accent2: #ff9900;
            --accent3: #00ffaa;
            --text: #f0ede8;
            --muted: #555;
            --border: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER / PROFILE */
        .header {
            padding: 24px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .logo a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .logo a:hover {
            opacity: 0.7;
        }

        .profile-stats {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .stat-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: var(--accent3);
        }

        .stat.xp .stat-value {
            color: var(--accent2);
        }

        .stat.streak .stat-value {
            color: var(--accent);
        }

        /* MAIN CONTENT */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* LESSON TITLE */
        .lesson-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .lesson-tag {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .lesson-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .progress-bar {
            margin-top: 20px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent3);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 10px;
            color: var(--muted);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* QUESTION */
        .question-block {
            margin-bottom: 40px;
            text-align: center;
        }

        #question-text {
            font-size: 24px;
            line-height: 1.4;
            margin-bottom: 12px;
            font-weight: bold;
        }

        #hint {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 20px;
            font-style: italic;
        }

        /* OPTIONS */
        #options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .option-btn {
            padding: 16px 24px;
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover:not(.correct):not(.incorrect) {
            border-color: var(--accent3);
            background: #1a1a1a;
            transform: translateX(4px);
        }

        .option-btn.correct {
            border-color: var(--accent3);
            background: rgba(0, 255, 170, 0.1);
            color: var(--accent3);
        }

        .option-btn.incorrect {
            border-color: var(--accent);
            background: rgba(255, 51, 51, 0.1);
            color: #999;
            text-decoration: line-through;
            cursor: not-allowed;
        }

        /* RESULT */
        #result {
            margin: 20px 0;
            padding: 20px;
            border-radius: 4px;
            border: 2px solid var(--border);
            text-align: center;
            transition: all 0.3s;
        }

        #result.correct {
            border-color: var(--accent3);
            background: rgba(0, 255, 170, 0.05);
        }

        #result.incorrect {
            border-color: var(--accent);
            background: rgba(255, 51, 51, 0.05);
        }

        .result-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .result-icon {
            font-size: 28px;
        }

        #result.correct .result-icon {
            color: var(--accent3);
        }

        #result.incorrect .result-icon {
            color: var(--accent);
        }

        .result-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            font-weight: bold;
        }

        .result-xp {
            font-size: 14px;
            color: var(--accent2);
            font-weight: bold;
            margin-left: 10px;
        }

        .result-explanation {
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
            line-height: 1.5;
        }

        #result.hidden {
            display: none;
        }

        /* BUTTONS */
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 40px;
        }

        #next-btn {
            padding: 12px 32px;
            background: var(--accent);
            border: none;
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        #next-btn:hover {
            background: #ff5555;
            transform: translateY(-2px);
        }

        #next-btn.hidden {
            display: none;
        }

        .guide-btn {
            padding: 12px 32px;
            background: transparent;
            border: 2px solid var(--accent3);
            color: var(--accent3);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
            text-decoration: none;
        }

        .guide-btn:hover {
            background: rgba(0, 255, 170, 0.1);
            transform: translateY(-2px);
        }

        /* FOOTER */
        footer {
            padding: 24px 40px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 2px;
        }

        /* NOISE OVERLAY */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            .profile-stats {
                width: 100%;
                justify-content: space-around;
            }

            .container {
                padding: 40px 20px;
            }

            .lesson-title {
                font-size: 32px;
            }

            #question-text {
                font-size: 18px;
            }

            .option-btn {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <a href="index.html">← TRASH TALK</a>
        </div>
        <div class="profile-stats">
            <div class="stat level">
                <span class="stat-label">УРОВЕНЬ</span>
                <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat xp">
                <span class="stat-label">XP</span>
                <span class="stat-value" id="xp">0</span>
            </div>
            <div class="stat streak">
                <span class="stat-label">СТРИК</span>
                <span class="stat-value" id="streak">0</span>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">
        <!-- LESSON HEADER -->
        <div class="lesson-header">
            <div class="lesson-tag">// Сегодняшний урок</div>
            <h1 class="lesson-title" id="lesson-title">Урок</h1>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 33%"></div>
            </div>
            <div class="progress-text">Вопрос <span id="progress">1/3</span></div>
        </div>

        <!-- QUESTION -->
        <div class="question-block">
            <div id="question-text">Вопрос загружается...</div>
            <div id="hint"></div>
        </div>

        <!-- OPTIONS -->
        <div id="options"></div>

        <!-- RESULT -->
        <div id="result" class="hidden"></div>

        <!-- BUTTONS -->
        <div class="button-group">
            <button id="next-btn" class="hidden">Дальше →</button>
            <a href="index.html" class="guide-btn">Справочник</a>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        TRASH TALK LEARNING GAME / 2026
    </footer>

    <!-- SCRIPTS -->
    <script src="data.js"></script>
    <script src="storage.js"></script>
    <script src="game.js"></script>
</body>

</html>
